<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест зрелости CRM | SystemSales</title>
    <link rel="stylesheet" href="/Mngment/style.css">
    <style>
        .test-tool { padding: 80px 20px; max-width: 700px; margin: 0 auto; }
        .test-tool h1 { text-align: center; margin-bottom: 30px; }
        .quiz-block { background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); }
        .quiz-question { margin-bottom: 25px; }
        .quiz-question p { font-weight: 600; margin-bottom: 10px; }
        .quiz-question label { display: block; margin-bottom: 5px; cursor: pointer; }
        .quiz-result { display: none; text-align: center; margin-top: 25px; padding: 20px; border-radius: 12px; }
        .quiz-result.show { display: block; }
        .quiz-result.low { background: #fff0f0; }
        .quiz-result.mid { background: #fff8e1; }
        .quiz-result.high { background: #f0fff4; }
        .quiz-score { font-size: 2rem; font-weight: 800; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="/Mngment/" class="logo">System<span>Sales</span></a>
        </div>
    </header>
    <main>
        <section class="test-tool">
            <h1>Тест зрелости CRM</h1>
            <div class="quiz-block" id="quiz">
                <div class="quiz-question">
                    <p>1. Как заявки попадают в CRM?</p>
                    <label><input type="radio" name="q1" value="0"> Вручную заносим</label>
                    <label><input type="radio" name="q1" value="1"> Частично через формы</label>
                    <label><input type="radio" name="q1" value="2"> Автоматически через Webhook/API</label>
                </div>
                <div class="quiz-question">
                    <p>2. Есть ли сквозная аналитика (источник → сделка → деньги)?</p>
                    <label><input type="radio" name="q2" value="0"> Нет</label>
                    <label><input type="radio" name="q2" value="1"> Видим только сделки</label>
                    <label><input type="radio" name="q2" value="2"> Полный цикл виден</label>
                </div>
                <div class="quiz-question">
                    <p>3. Интегрирована ли телефония с CRM?</p>
                    <label><input type="radio" name="q3" value="0"> Нет</label>
                    <label><input type="radio" name="q3" value="1"> Звоним, но без записи</label>
                    <label><input type="radio" name="q3" value="2"> Запись звонков, автоопределение клиента</label>
                </div>
                <button class="btn btn-primary" id="checkBtn">Узнать результат</button>
                <div class="quiz-result" id="quizResult">
                    <p>Ваш уровень зрелости CRM:</p>
                    <p class="quiz-score" id="quizScore"></p>
                    <p id="quizText"></p>
                </div>
            </div>
        </section>
    </main>
    <footer class="footer"><div class="container"><p>© 2026 SystemSales</p></div></footer>
    <script>
        document.getElementById('checkBtn').addEventListener('click', function() {
            const q1 = document.querySelector('input[name="q1"]:checked');
            const q2 = document.querySelector('input[name="q2"]:checked');
            const q3 = document.querySelector('input[name="q3"]:checked');
            
            if (!q1 || !q2 || !q3) { alert('Ответьте на все вопросы'); return; }
            
            const score = parseInt(q1.value) + parseInt(q2.value) + parseInt(q3.value);
            const resultDiv = document.getElementById('quizResult');
            const scoreEl = document.getElementById('quizScore');
            const textEl = document.getElementById('quizText');
            
            resultDiv.classList.add('show');
            resultDiv.classList.remove('low', 'mid', 'high');
            
            if (score <= 2) {
                resultDiv.classList.add('low');
                scoreEl.textContent = score + '/6';
                textEl.textContent = 'Начальный уровень. CRM работает как записная книжка. Нужно настраивать интеграции и автоматизацию.';
            } else if (score <= 4) {
                resultDiv.classList.add('mid');
                scoreEl.textContent = score + '/6';
                textEl.textContent = 'Средний уровень. Базовые процессы есть, но много ручного труда. Есть куда расти.';
            } else {
                resultDiv.classList.add('high');
                scoreEl.textContent = score + '/6';
                textEl.textContent = 'Высокий уровень! CRM — ваш инструмент продаж. Возможно, пора внедрять AI-агентов.';
            }
        });
    </script>
</body>
</html>
